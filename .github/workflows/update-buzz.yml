name: 네이버 버즈 자동 업데이트

on:
  schedule:
    - cron: '0 0 * * 1'   # 매주 월요일 오전 9시 (KST = UTC+9 → UTC 00:00)
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  update-buzz:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests

      - name: 네이버 API 버즈 수집
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python fetch_naver_buzz.py

      - name: index.html 업데이트
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python update_index_buzz.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html naver_buzz_cache.json
          git diff --staged --quiet || git commit -m "자동 업데이트: 네이버 버즈 $(date +'%Y-%m-%d')"
          git push
